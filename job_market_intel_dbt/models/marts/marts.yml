version: 2

models:
  - name: mart_role_demand
    description: "Demand aggregated by role family."
    columns:
      - name: role_family
        tests:
          - not_null

      - name: demand
        tests:
          - not_null

  - name: mart_skill_demand
    description: "Demand aggregated by skill."
    columns:
      - name: skill
        tests:
          - not_null
      - name: demand
        tests:
          - not_null

  - name: mart_role_skill_demand
    description: "Demand aggregated by role family and skill."
    columns:
      - name: role_family
        tests:
          - not_null
      - name: skill
        tests:
          - not_null
      - name: demand
        tests:
          - not_null

  - name: mart_role_demand_by_seniority
    description: "Demand aggregated by role family and seniority level."
    columns:
      - name: role_family
        tests:
          - not_null
      - name: seniority_level
        tests:
          - not_null
      - name: demand
        tests:
          - not_null